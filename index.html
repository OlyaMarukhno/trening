<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoTote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Fira+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
      integrity="sha512-q6WgHqiHlKyOqslT/lgBgodhd03Wp4BEqKeW6nNtlOY4quzyG3VoQKFrieaCeSnuVseNKRGpGeDU3qPmabCANg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <section class="gallery section">
        <div class="container gallery-container" id="gallery">
          <div class="title-section-gallery">
            <h2 class="title-gallery">Галерея зображень</h2>
            <h3 class="subtitle-gallery">EcoTotes у повсякденному житті</h3>
          </div>
          <div class="img-section-list">
            <ul class="list-gallery">
              <li class="item-list-gallery">
                <div class="img-section img_1">
                  <picture>
                    <source
                      srcset="
                        ./img-gallery/in-coffee-shop-dt.jpg    1x,
                        ./img-gallery/in-coffee-shop-dt-x2.jpg 2x
                      "
                      media="(min-width: 1440px)"
                    />
                    <source
                      srcset="
                        ./img-gallery/in-coffee-shop-tab.jpg    1x,
                        ./img-gallery/in-coffee-shop-tab-x2.jpg 2x
                      "
                      media="(min-width: 768px)"
                    />
                    <source
                      srcset="
                        ./img-gallery/in-coffee-shop-mob.jpg    1x,
                        ./img-gallery/in-coffee-shop-mob-x2.jpg 2x
                      "
                      media="(max-width: 767px)"
                    />
                    <img
                      src="./img-gallery/in-coffee-shop-dt.jpg"
                      alt="An eco tote placed on a chair or beside a table at a cozy coffee shop"
                      width="421"
                    />
                  </picture>
                </div>
              </li>
              <li class="item-list-gallery">
                <div class="img-section img_2">
                  <picture>
                    <source
                      srcset="
                        ./img-gallery/stylish-person-dt.jpg    1x,
                        ./img-gallery/stylish-person-dt-x2.jpg 2x
                      "
                      media="(min-width: 1440px)"
                    />
                    <source
                      srcset="
                        ./img-gallery/stylish-person-tab.jpg    1x,
                        ./img-gallery/stylish-person-tab-x2.jpg 2x
                      "
                      media="(min-width: 768px)"
                    />
                    <source
                      srcset="
                        ./img-gallery/stylish-person-mob.jpg    1x,
                        ./img-gallery/stylish-person-mob-x2.jpg 2x
                      "
                      media="(max-width: 767px)"
                    />
                    <img
                      src="./img-gallery/stylish-person-dt.jpg"
                      alt="A city scene where a stylish person carries a tote bag while crossing a street or standing at a crosswalk"
                      width="421"
                    />
                  </picture>
                </div>
              </li>
              <li class="item-list-gallery">
                <div class="img-section img_3">
                  <picture>
                    <source
                      srcset="
                        ./img-gallery/person-walking-dt.jpg    1x,
                        ./img-gallery/person-walking-dt-x2.jpg 2x
                      "
                      media="(min-width: 1440px)"
                    />
                    <source
                      srcset="
                        ./img-gallery/person-walking-tab.jpg    1x,
                        ./img-gallery/person-walking-tab-x2.jpg 2x
                      "
                      media="(min-width: 768px)"
                    />
                    <source
                      srcset="
                        ./img-gallery/person-walking-mob.jpg    1x,
                        ./img-gallery/person-walking-mob-x2.jpg 2x
                      "
                      media="(max-width: 767px)"
                    />
                    <img
                      src="./img-gallery/person-walking-dt.jpg"
                      alt="A person walking through a park or nature trail carrying an eco-friendly tote bag on their shoulder."
                      width="421"
                    />
                  </picture>
                </div>
              </li>
              <li class="item-list-gallery">
                <div class="img-section img_4">
                  <picture>
                    <source
                      srcset="
                        ./img-gallery/young-woman-dt.jpg    1x,
                        ./img-gallery/young-woman-dt-x2.jpg 2x
                      "
                      media="(min-width: 1440px)"
                    />
                    <source
                      srcset="
                        ./img-gallery/young-woman-tab.jpg    1x,
                        ./img-gallery/young-woman-tab-x2.jpg 2x
                      "
                      media="(min-width: 768px)"
                    />
                    <source
                      srcset="
                        ./img-gallery/young-woman-mob.jpg    1x,
                        ./img-gallery/young-woman-mob-x2.jpg 2x
                      "
                      media="(max-width: 767px)"
                    />
                    <img
                      src="./img-gallery/young-woman-dt.jpg"
                      alt="A young woman holding a large eco tote bag filled with fresh vegetables and fruits at a local farmer's market"
                      width="421"
                    />
                  </picture>
                </div>
              </li>
            </ul>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
